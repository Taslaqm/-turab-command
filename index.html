<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turab Partners / OS</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0e0c;--surface:#1a1814;--surface2:#222018;--surface3:#2a2820;
  --border:#2e2b22;--border2:#3a3728;--ink:#e8e0cc;--ink2:#a89e88;--ink3:#6a6050;
  --clay:#c4622e;--clay2:#e07840;--gold:#c8a040;--teal:#2a7a72;--teal2:#3a9a90;
  --green:#2a6a3a;--green2:#3a8a4a;--red:#8a2020;--red2:#b03030;
  --r:10px;--r2:14px;
}
html{font-size:15px;}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:16px;}
.tb-brand{font-family:'Fraunces',serif;font-size:17px;font-weight:500;color:var(--ink);white-space:nowrap;}
.tb-brand span{color:var(--ink3);font-weight:300;}
.tb-nav{display:flex;gap:2px;}
.tb-btn{background:none;border:none;color:var(--ink2);font-size:13px;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tb-btn:hover{background:var(--surface2);color:var(--ink);}
.tb-btn.active{background:var(--surface3);color:var(--ink);font-weight:500;}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-reminder-badge{background:var(--clay);color:#fff;font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;cursor:pointer;display:none;}

/* ── MAIN LAYOUT ── */
.shell{display:flex;flex:1;overflow:hidden;}
.sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:14px 10px;flex-shrink:0;overflow-y:auto;}
.main{flex:1;overflow-y:auto;padding:24px;}
@media(max-width:680px){.sidebar{display:none;}.main{padding:14px;}}

/* ── SIDEBAR ── */
.sb-section{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);padding:4px 8px;margin:10px 0 4px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;font-size:12.5px;color:var(--ink2);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;}
.sb-item:hover{background:var(--surface2);color:var(--ink);}
.sb-item.active{background:var(--clay);color:#fff;}
.sb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sb-cnt{margin-left:auto;font-size:10px;background:rgba(255,255,255,.12);padding:1px 6px;border-radius:8px;}

/* ── PAGE HEADERS ── */
.page-head{margin-bottom:20px;}
.page-eyebrow{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.page-title{font-family:'Fraunces',serif;font-size:26px;font-weight:500;line-height:1.1;}
.page-title em{color:var(--clay2);font-style:italic;}
.page-sub{font-size:13px;color:var(--ink2);margin-top:6px;line-height:1.5;}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;margin-bottom:14px;}
.card-title{font-size:12px;font-weight:600;color:var(--ink2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.card-title span{width:6px;height:6px;border-radius:50%;background:var(--clay);display:inline-block;}

/* ── STATS ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:14px;}
.stat{background:var(--surface2);border-radius:var(--r);padding:14px;}
.stat-l{font-size:11px;color:var(--ink3);margin-bottom:4px;}
.stat-v{font-size:24px;font-weight:500;}
.stat-s{font-size:11px;color:var(--ink3);margin-top:2px;}

/* ── CHANNEL GRID ── */
.ch-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:14px;}
.ch-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.ch-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.ch-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.ch-card.selected{border-color:var(--clay);background:var(--surface2);}
.ch-num{font-size:10px;color:var(--ink3);margin-bottom:5px;letter-spacing:.05em;}
.ch-name{font-size:13.5px;font-weight:500;line-height:1.3;margin-bottom:5px;}
.ch-price{font-size:11.5px;color:var(--ink3);}
.ch-cnt{position:absolute;top:12px;right:12px;font-size:10px;background:var(--surface3);padding:2px 7px;border-radius:10px;color:var(--ink2);}

/* ── BADGES ── */
.badge{display:inline-block;font-size:10.5px;padding:3px 9px;border-radius:20px;font-weight:500;}
.b-wedge{background:#3a2a08;color:#d4a040;}
.b-core{background:#3a1808;color:#e07840;}
.b-annuity{background:#083a20;color:#40c070;}
.b-channel{background:#08203a;color:#4090d0;}
.b-referral{background:#2a2820;color:#a09070;}

/* ── CHANNEL DETAIL ── */
.ch-detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.ch-detail-name{font-family:'Fraunces',serif;font-size:22px;font-weight:500;}
.ch-detail-meta{font-size:12px;color:var(--ink3);margin-top:3px;}

.tips-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;margin-top:10px;}
.tip{background:var(--surface2);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:10px 12px;}
.tip-label{font-size:10px;color:var(--gold);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
.tip-text{font-size:12.5px;color:var(--ink2);line-height:1.5;}

/* ── PLAN FIELDS ── */
.pf{margin-bottom:14px;}
.pf-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);font-weight:600;margin-bottom:5px;}
.pf-val{font-size:13px;color:var(--ink2);line-height:1.6;}
.pf-val.set{color:var(--ink);}
.pf-empty{color:var(--ink3);font-style:italic;font-size:12.5px;}
.edit-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:1px solid var(--border2);border-radius:6px;padding:3px 9px;font-size:11.5px;color:var(--ink3);cursor:pointer;margin-top:5px;transition:all .15s;}
.edit-btn:hover{border-color:var(--border2);color:var(--ink);background:var(--surface2);}
.pf-ta{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--ink);font-family:'Inter',sans-serif;resize:vertical;min-height:70px;line-height:1.55;margin-top:5px;}
.pf-ta:focus{outline:none;border-color:var(--clay);}

/* ── DIVIDER ── */
.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}

/* ── JOURNAL ── */
.j-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.j-title{font-size:14px;font-weight:500;}
.btn-new{display:inline-flex;align-items:center;gap:6px;background:var(--clay);border:none;border-radius:8px;padding:7px 14px;font-size:12.5px;font-weight:500;color:#fff;cursor:pointer;transition:opacity .15s;}
.btn-new:hover{opacity:.85;}

.compose{background:var(--surface2);border:1px solid var(--clay);border-radius:var(--r2);padding:16px;margin-bottom:12px;}
.type-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.type-pill{background:var(--surface3);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:11.5px;color:var(--ink2);cursor:pointer;transition:all .15s;}
.type-pill:hover{border-color:var(--border2);color:var(--ink);}
.type-pill.active{background:var(--clay);border-color:var(--clay);color:#fff;}
.compose-ta{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:13.5px;color:var(--ink);font-family:'Inter',sans-serif;resize:vertical;min-height:90px;line-height:1.6;}
.compose-ta:focus{outline:none;border-color:var(--clay);}
.compose-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;flex-wrap:wrap;gap:8px;}
.compose-char{font-size:11px;color:var(--ink3);}
.btn-row{display:flex;gap:8px;}
.btn-log{background:var(--clay);border:none;border-radius:8px;padding:6px 16px;font-size:12.5px;font-weight:500;color:#fff;cursor:pointer;}
.btn-log:hover{opacity:.85;}
.btn-cancel{background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--ink2);cursor:pointer;}
.btn-cancel:hover{background:var(--surface3);}

.entry-list{display:flex;flex-direction:column;gap:8px;}
.entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:13px 15px;}
.entry-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
.entry-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.etype{font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:500;}
.et-journal{background:#08203a;color:#60a0e0;}
.et-memo{background:#3a2a08;color:#d4a040;}
.et-lead{background:#083a20;color:#40c070;}
.et-blocker{background:#3a0808;color:#e06060;}
.entry-date{font-size:11px;color:var(--ink3);}
.entry-ch-tag{font-size:11px;color:var(--ink3);background:var(--surface2);padding:2px 8px;border-radius:10px;}
.del-btn{background:none;border:none;color:var(--ink3);cursor:pointer;padding:2px 6px;border-radius:4px;font-size:13px;transition:all .15s;}
.del-btn:hover{color:#e06060;background:#3a0808;}
.entry-body{font-size:13px;color:var(--ink);line-height:1.65;white-space:pre-wrap;}

.empty{text-align:center;padding:3rem 1rem;color:var(--ink3);}
.empty p{font-size:13px;}

/* ── REMINDERS ── */
.reminder-compose{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r2);padding:16px;margin-bottom:14px;}
.r-row{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:10px;align-items:end;}
.r-input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--ink);font-family:'Inter',sans-serif;}
.r-input:focus{outline:none;border-color:var(--clay);}
.r-date{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--ink);font-family:'Inter',sans-serif;color-scheme:dark;}
.r-date:focus{outline:none;border-color:var(--clay);}
.r-ch-select{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--ink);font-family:'Inter',sans-serif;margin-bottom:10px;}
.r-ch-select:focus{outline:none;border-color:var(--clay);}
.btn-add-r{background:var(--clay);border:none;border-radius:8px;padding:9px 16px;font-size:12.5px;font-weight:500;color:#fff;cursor:pointer;white-space:nowrap;}
.btn-add-r:hover{opacity:.85;}

.reminder-list{display:flex;flex-direction:column;gap:8px;}
.reminder-item{display:flex;align-items:flex-start;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}
.reminder-item.done{opacity:.4;}
.r-check{width:16px;height:16px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;cursor:pointer;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.r-check.checked{background:var(--teal2);border-color:var(--teal2);}
.r-check.checked::after{content:'✓';font-size:10px;color:#fff;}
.r-body{flex:1;}
.r-text{font-size:13px;color:var(--ink);line-height:1.5;}
.r-meta{display:flex;gap:8px;align-items:center;margin-top:4px;flex-wrap:wrap;}
.r-date-tag{font-size:11px;color:var(--ink3);}
.r-date-tag.overdue{color:#e06060;}
.r-ch-tag{font-size:11px;color:var(--ink3);background:var(--surface2);padding:2px 7px;border-radius:8px;}
.r-priority{font-size:10px;padding:2px 7px;border-radius:10px;}
.rp-high{background:#3a0808;color:#e06060;}
.rp-med{background:#3a2a08;color:#d4a040;}
.rp-low{background:#083a20;color:#40c070;}

/* ── AI EMAIL ── */
.email-composer{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:700px){.email-composer{grid-template-columns:1fr;}}
.email-left,.email-right{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px;}
.email-section-title{font-size:11px;font-weight:600;color:var(--ink2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;}
.email-field{margin-bottom:12px;}
.email-label{font-size:11px;color:var(--ink3);margin-bottom:4px;}
.email-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--ink);font-family:'Inter',sans-serif;}
.email-input:focus{outline:none;border-color:var(--clay);}
.email-ta{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--ink);font-family:'Inter',sans-serif;resize:vertical;min-height:80px;line-height:1.55;}
.email-ta:focus{outline:none;border-color:var(--clay);}
.email-select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--ink);}
.email-select:focus{outline:none;border-color:var(--clay);}
.btn-generate{width:100%;background:var(--clay);border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:500;color:#fff;cursor:pointer;transition:opacity .15s;margin-top:4px;}
.btn-generate:hover{opacity:.85;}
.btn-generate:disabled{opacity:.4;cursor:not-allowed;}

.email-output{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:14px;min-height:200px;font-size:13px;color:var(--ink);line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.email-output.placeholder{color:var(--ink3);font-style:italic;}
.email-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.btn-copy{background:var(--surface3);border:1px solid var(--border2);border-radius:7px;padding:6px 14px;font-size:12px;color:var(--ink2);cursor:pointer;transition:all .15s;}
.btn-copy:hover{background:var(--surface2);color:var(--ink);}
.generating-indicator{display:flex;align-items:center;gap:8px;color:var(--ink3);font-size:13px;font-style:italic;}
.dot-anim{display:flex;gap:3px;}
.dot-anim span{width:5px;height:5px;border-radius:50%;background:var(--clay);animation:pulse 1.2s infinite;}
.dot-anim span:nth-child(2){animation-delay:.2s;}
.dot-anim span:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,80%,100%{opacity:.2;}40%{opacity:1;}}

/* ── RECENT FEED ── */
.feed{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;}
.feed-item{display:flex;gap:12px;align-items:flex-start;padding:11px 15px;border-bottom:1px solid var(--border);}
.feed-item:last-child{border-bottom:none;}
.feed-ch{font-size:11px;color:var(--ink3);min-width:90px;line-height:1.4;padding-top:1px;}
.feed-body{font-size:12.5px;color:var(--ink);flex:1;line-height:1.5;}
.feed-date{font-size:11px;color:var(--ink3);white-space:nowrap;}
.feed-empty{padding:2rem;text-align:center;color:var(--ink3);font-size:13px;}

/* ── FILTER ── */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.filter-btn{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--ink3);cursor:pointer;transition:all .15s;}
.filter-btn:hover{border-color:var(--border2);color:var(--ink);}
.filter-btn.active{background:var(--clay);border-color:var(--clay);color:#fff;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--teal2);color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-brand">Turab Partners <span>/ OS</span></div>
  <div class="tb-nav">
    <button class="tb-btn active" id="nav-overview" onclick="go('overview')">Overview</button>
    <button class="tb-btn" id="nav-channels" onclick="go('channels')">Channels</button>
    <button class="tb-btn" id="nav-journal" onclick="go('journal')">Journal</button>
    <button class="tb-btn" id="nav-reminders" onclick="go('reminders')">Reminders</button>
    <button class="tb-btn" id="nav-email" onclick="go('email')">AI Email</button>
  </div>
  <div class="tb-right">
    <div class="tb-reminder-badge" id="reminder-badge" onclick="go('reminders')">0 due</div>
  </div>
</div>

<!-- SHELL -->
<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-section">Workspace</div>
    <button class="sb-item active" id="sb-overview" onclick="go('overview')">⌂ Overview</button>
    <button class="sb-item" id="sb-journal" onclick="go('journal')">≡ All entries</button>
    <button class="sb-item" id="sb-reminders" onclick="go('reminders')">◷ Reminders</button>
    <button class="sb-item" id="sb-email" onclick="go('email')">✉ AI Email</button>
    <div class="sb-section" style="margin-top:16px">Channels</div>
    <div id="sb-channels"></div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main"></main>
</div>

<div class="toast" id="toast"></div>

<script>
const CHANNELS=[
  {id:'diagnostic',num:'01',color:'#c8a040',badge:'wedge',badgeLabel:'The Wedge',
   name:'Ecosystem Diagnostic',price:'$25K–50K',duration:'4–6 weeks',
   desc:'A structured 4–6 week assessment that maps where a country, university, or institution actually sits on the venture-maturity curve. You interview stakeholders, audit what exists, identify the gaps, and deliver a prioritized roadmap. The buyer pays a low-risk fee and gets a clear picture of what to build. You get a scoped mandate for the real work.',
   tips:['Lead every new market with this — it\'s the fastest way to get paid while building the relationship','Price the first one at $28–32K to reduce friction; raise it once you have two logos','Deliver a visual "maturity map" as the hero artifact — it\'s easy for a minister to share upward','Always close the diagnostic with a recommended next step scoped and priced'],
   goal:'Land 2 paid diagnostics inside 6 months — one in Jordan, one in Iraq or Syria.',
   targets:'Ministries of economy/innovation, university leadership, donor-funded programs in Jordan and Iraq.',
   actions:'Draft a one-page diagnostic brief. Reach out through Tamer\'s Endeavor network and referral layer. Price at $30K to reduce friction on first engagement.'},
  {id:'readiness',num:'02',color:'#cf7a52',badge:'core',badgeLabel:'Core Mandate',
   name:'Investment Readiness Program',price:'$75K–150K',duration:'3–6 months',
   desc:'A cohort-based program that takes early-stage startups and makes them genuinely fundable. You design the curriculum, source and manage mentors, run the sessions, and produce a demo day with investor attendance. The output donors and governments can count: X startups trained, Y raised, Z investor meetings held. Once the template is built, this runs in multiple countries simultaneously.',
   tips:['Template everything after the first delivery — docs, curriculum, scoring rubrics — so you can sub-contract delivery','Donor buyers (GIZ, EU, USAID) need measurable KPIs upfront — build them into the proposal','The demo day is the most valuable part for the buyer\'s PR; make it look world-class','Get a local university or ministry to co-brand it — it makes procurement far easier'],
   goal:'Template the program by month 3. Target first delivery in Jordan before selling abroad.',
   targets:'Universities, national innovation authorities, donor-funded accelerator programs (GIZ, EU, USAID-adjacent).',
   actions:'Build the curriculum skeleton from HTU advisory work. Create a donor-ready proposal template with measurable outputs.'},
  {id:'build',num:'03',color:'#b4552f',badge:'core',badgeLabel:'Flagship',
   name:'Ecosystem & Engine Build',price:'$150K–300K+',duration:'6–18 months',
   desc:'The full build: you design and stand up the actual institution. This means fund structure and governance, deal-flow engine, angel/investor network, operating model, team hiring criteria, and sometimes the physical space. This is the work almost nobody in the region can credibly sell because they haven\'t done it. You have done it — twice. PSUT and HTU are your proof of concept.',
   tips:['Lead with the PSUT case study — it\'s your most direct comparable for institutional buyers','Governments move slow; get an MOU signed early to keep momentum while procurement clears','Build in a 6-month advisory retainer as the default contract extension — don\'t treat it as optional','Central Asia buyers (KZ, UZ) often need a local partner entity for procurement — map this early'],
   goal:'One flagship build mandate in pipeline by month 6. Target Central Asia or Iraq as first non-Jordan win.',
   targets:'Governments, sovereign innovation funds, development banks (IFC, EBRD-adjacent), large university systems.',

const TYPE_LABELS={journal:'Journal',memo:'Memo',lead:'Lead',blocker:'Blocker'};
const PRIORITIES=['high','med','low'];

let S={
  view:'overview',selCh:'diagnostic',
  entries:[],plans:{},reminders:[],
  editing:null,composing:false,composeType:'journal',composeText:'',
  filterCh:'all',filterType:'all',
  emailTo:'',emailContext:'',emailTone:'professional',emailType:'outreach',emailOutput:'',emailGenerating:false,
  rText:'',rDate:'',rCh:'all',rPriority:'med',
  addingReminder:false,
};

function ls(k){try{return JSON.parse(localStorage.getItem(k)||'null');}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(){S.entries=ls('tp_entries')||[];S.plans=ls('tp_plans')||{};S.reminders=ls('tp_reminders')||[];render();}

function uid(){return Date.now()+'_'+Math.random().toString(36).slice(2);}
function fmtDate(ts){const d=new Date(ts);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
function fmtDateShort(ts){return new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function chEntries(id){return S.entries.filter(e=>e.ch===id);}
function getCh(id){return CHANNELS.find(c=>c.id===id);}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function go(v,chId){
  S.view=v;if(chId)S.selCh=chId;
  S.composing=false;S.editing=null;
  render();
}

function render(){
  renderSidebar();renderBadge();
  const m=document.getElementById('main');
  if(S.view==='overview')m.innerHTML=renderOverview();
  else if(S.view==='channels')m.innerHTML=renderChannels();
  else if(S.view==='journal')m.innerHTML=renderJournal();
  else if(S.view==='reminders')m.innerHTML=renderReminders();
  else if(S.view==='email')m.innerHTML=renderEmail();
  ['overview','channels','journal','reminders','email'].forEach(v=>{
    const b=document.getElementById('nav-'+v);
    const s=document.getElementById('sb-'+v);
    if(b)b.className='tb-btn'+(S.view===v?' active':'');
    if(s)s.className='sb-item'+(S.view===v?' active':'');
  });
  if(S.view==='channels')attachChannelEvents();
  if(S.view==='email')attachEmailEvents();
  if(S.view==='reminders')attachReminderEvents();
}

function renderBadge(){
  const now=Date.now();
  const due=S.reminders.filter(r=>!r.done&&r.date&&new Date(r.date).getTime()<=now+86400000*1).length;
  const b=document.getElementById('reminder-badge');
  if(due>0){b.style.display='block';b.textContent=due+' due';}else{b.style.display='none';}
}

function renderSidebar(){
  document.getElementById('sb-channels').innerHTML=CHANNELS.map(c=>{
    const cnt=chEntries(c.id).length;
    const active=S.view==='channels'&&S.selCh===c.id;
    return`<button class="sb-item${active?' active':''}" onclick="go('channels','${c.id}')">
      <span class="sb-dot" style="background:${c.color}"></span>
      <span style="flex:1;text-align:left">${c.name}</span>
      ${cnt>0?`<span class="sb-cnt">${cnt}</span>`:''}
    </button>`;
  }).join('');
}

function renderOverview(){
  const total=S.entries.length;
  const now=new Date();
  const thisMonth=S.entries.filter(e=>{const d=new Date(e.ts);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;
  const leads=S.entries.filter(e=>e.type==='lead').length;
  const dueReminders=S.reminders.filter(r=>!r.done&&r.date&&new Date(r.date).getTime()<=Date.now()+86400000).length;
  const recent=[...S.entries].sort((a,b)=>b.ts-a.ts).slice(0,6);
  const maxCnt=Math.max(1,...CHANNELS.map(c=>chEntries(c.id).length));
  return`
    <div class="page-head">
      <div class="page-eyebrow">Command Centre</div>
      <div class="page-title">Good to see you, <em>Muhannad.</em></div>
      <div class="page-sub">Turab Partners · Muhannad Taslaq & Tamer Salah</div>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="stat-l">Total entries</div><div class="stat-v">${total}</div><div class="stat-s">across all channels</div></div>
      <div class="stat"><div class="stat-l">This month</div><div class="stat-v">${thisMonth}</div><div class="stat-s">new entries</div></div>
      <div class="stat"><div class="stat-l">Active leads</div><div class="stat-v">${leads}</div><div class="stat-s">logged</div></div>
      <div class="stat"><div class="stat-l">Reminders due</div><div class="stat-v" style="${dueReminders>0?'color:var(--clay2)':''}">${dueReminders}</div><div class="stat-s">within 24hrs</div></div>
    </div>
    <div class="ch-grid">
      ${CHANNELS.map(c=>{const cnt=chEntries(c.id).length;return`<div class="ch-card" onclick="go('channels','${c.id}')" style="">
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${c.color};border-radius:var(--r2) var(--r2) 0 0"></div>
        <div class="ch-num">${c.num}</div>
        <div class="ch-name">${c.name}</div>
        <div class="ch-price">${c.price}</div>
        ${cnt>0?`<div class="ch-cnt">${cnt}</div>`:''}
      </div>`;}).join('')}
    </div>
    <div style="font-size:12px;color:var(--ink3);margin-bottom:10px;font-weight:500;letter-spacing:.04em;text-transform:uppercase">Recent activity</div>
    <div class="feed">
      ${recent.length===0?`<div class="feed-empty">No entries yet — pick a channel and start logging.</div>`:
        recent.map(e=>`<div class="feed-item">
          <div class="feed-ch">${getCh(e.ch)?.name||e.ch}</div>
          <div class="feed-body">${e.text.slice(0,100)}${e.text.length>100?'…':''}</div>
          <div class="feed-date">${fmtDate(e.ts)}</div>
        </div>`).join('')}
    </div>`;
}

function renderChannels(){
  const ch=getCh(S.selCh);
  const plan=S.plans[S.selCh]||{};
  const entries=chEntries(S.selCh).sort((a,b)=>b.ts-a.ts);
  const planFields=[
    {key:'goal',label:'6-month goal',def:ch.goal},
    {key:'targets',label:'Target buyers',def:ch.targets},
    {key:'actions',label:'Priority actions',def:ch.actions},
    {key:'notes',label:'Custom notes',def:''},
  ];
  const planHtml=planFields.map(f=>{
    const val=plan[f.key]!==undefined?plan[f.key]:f.def;
    const editing=S.editing===S.selCh+':'+f.key;
    return`<div class="pf">
      <div class="pf-label">${f.label}</div>
      ${editing?`<textarea class="pf-ta" id="pf-${f.key}">${val}</textarea>
        <div class="btn-row" style="margin-top:7px">
          <button class="btn-log" onclick="savePlan('${f.key}')">Save</button>
          <button class="btn-cancel" onclick="cancelEdit()">Cancel</button>
        </div>`:
        `<div class="pf-val${val?' set':''}">${val||`<span class="pf-empty">Not set — click edit</span>`}</div>
        <button class="edit-btn" onclick="editPlan('${f.key}')">✎ Edit</button>`}
    </div>`;
  }).join('<hr class="divider">');

  const composeHtml=S.composing?`<div class="compose">
    <div class="type-row">
      ${Object.entries(TYPE_LABELS).map(([k,v])=>`<button class="type-pill${S.composeType===k?' active':''}" onclick="setType('${k}')">${v}</button>`).join('')}
    </div>
    <textarea class="compose-ta" id="compose-ta" placeholder="Write your entry...">${S.composeText}</textarea>
    <div class="compose-foot">
      <span class="compose-char" id="comp-char">${S.composeText.length} chars</span>
      <div class="btn-row">
        <button class="btn-cancel" onclick="cancelCompose()">Cancel</button>
        <button class="btn-log" onclick="logEntry()">Log entry</button>
      </div>
    </div>
  </div>`:'';

  const entriesHtml=entries.length===0?`<div class="empty"><p>No entries yet for this channel.</p></div>`:
    entries.map(e=>`<div class="entry">
      <div class="entry-head">
        <div class="entry-meta">
          <span class="etype et-${e.type}">${TYPE_LABELS[e.type]||e.type}</span>
          <span class="entry-date">${fmtDate(e.ts)}</span>
        </div>
        <button class="del-btn" onclick="delEntry('${e.id}')">✕</button>
      </div>
      <div class="entry-body">${e.text}</div>
    </div>`).join('');

  return`
    <div class="ch-detail-head">
      <div>
        <div style="font-size:11px;color:var(--ink3);margin-bottom:5px">${ch.num} · ${ch.price} · ${ch.duration}</div>
        <div class="ch-detail-name">${ch.name}</div>
      </div>
      <span class="badge b-${ch.badge}">${ch.badgeLabel}</span>
    </div>
    <div class="card">
      <div class="card-title"><span></span> About this channel</div>
      <div style="font-size:13.5px;color:var(--ink2);line-height:1.7">${ch.desc}</div>
    </div>
    <div class="card">
      <div class="card-title"><span style="background:var(--gold)"></span> Tips & tactics</div>
      <div class="tips-grid">
        ${ch.tips.map(t=>`<div class="tip"><div class="tip-label">Tip</div><div class="tip-text">${t}</div></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span style="background:var(--teal2)"></span> Channel plan</div>
      ${planHtml}
    </div>
    <div class="j-head">
      <div class="j-title">Journal <span style="color:var(--ink3);font-weight:400;font-size:13px">${entries.length} entr${entries.length===1?'y':'ies'}</span></div>
      ${!S.composing?`<button class="btn-new" onclick="openCompose()">+ New entry</button>`:''}
    </div>
    ${composeHtml}
    <div class="entry-list">${entriesHtml}</div>`;
}

function renderJournal(){
  let filtered=S.entries;
  if(S.filterCh!=='all')filtered=filtered.filter(e=>e.ch===S.filterCh);
  if(S.filterType!=='all')filtered=filtered.filter(e=>e.type===S.filterType);
  filtered=[...filtered].sort((a,b)=>b.ts-a.ts);
  const chFilters=`<button class="filter-btn${S.filterCh==='all'?' active':''}" onclick="setFilter('ch','all')">All</button>`+
    CHANNELS.map(c=>`<button class="filter-btn${S.filterCh===c.id?' active':''}" onclick="setFilter('ch','${c.id}')">${c.name}</button>`).join('');
  const typeFilters=`<button class="filter-btn${S.filterType==='all'?' active':''}" onclick="setFilter('type','all')">All types</button>`+
    Object.entries(TYPE_LABELS).map(([k,v])=>`<button class="filter-btn${S.filterType===k?' active':''}" onclick="setFilter('type','${k}')">${v}</button>`).join('');
  const entriesHtml=filtered.length===0?`<div class="empty"><p>No entries match this filter.</p></div>`:
    filtered.map(e=>`<div class="entry">
      <div class="entry-head">
        <div class="entry-meta">
          <span class="etype et-${e.type}">${TYPE_LABELS[e.type]||e.type}</span>
          <span class="entry-ch-tag">${getCh(e.ch)?.name||e.ch}</span>
          <span class="entry-date">${fmtDate(e.ts)}</span>
        </div>
        <button class="del-btn" onclick="delEntry('${e.id}')">✕</button>
      </div>
      <div class="entry-body">${e.text}</div>
    </div>`).join('');
  return`
    <div class="page-head">
      <div class="page-title">All entries</div>
      <div class="page-sub">${filtered.length} entr${filtered.length===1?'y':'ies'} · full log across every channel</div>
    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:10px;color:var(--ink3);margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase">Channel</div>
      <div class="filter-row">${chFilters}</div>
      <div style="font-size:10px;color:var(--ink3);margin-bottom:6px;margin-top:10px;letter-spacing:.08em;text-transform:uppercase">Type</div>
      <div class="filter-row">${typeFilters}</div>
    </div>
    <div class="entry-list">${entriesHtml}</div>`;
}

function renderReminders(){
  const now=Date.now();
  const active=S.reminders.filter(r=>!r.done).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const done=S.reminders.filter(r=>r.done);
  const chOptions=`<option value="all">All channels</option>`+CHANNELS.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  const addForm=S.addingReminder?`<div class="reminder-compose">
    <div style="font-size:11px;color:var(--ink3);margin-bottom:8px;letter-spacing:.08em;text-transform:uppercase">New reminder</div>
    <div class="r-row">
      <input class="r-input" id="r-text" placeholder="What do you need to do?" value="${S.rText}">
      <input class="r-date" type="date" id="r-date" value="${S.rDate}">
    </div>
    <select class="r-ch-select" id="r-ch">${chOptions.replace(`value="${S.rCh}"`,`value="${S.rCh}" selected`)}</select>
    <div class="type-row">
      ${PRIORITIES.map(p=>`<button class="type-pill${S.rPriority===p?' active':''}" onclick="setRPriority('${p}')">${p.charAt(0).toUpperCase()+p.slice(1)}</button>`).join('')}
    </div>
    <div class="btn-row">
      <button class="btn-log" onclick="addReminder()">Add reminder</button>
      <button class="btn-cancel" onclick="cancelAddReminder()">Cancel</button>
    </div>
  </div>`:'';

  const rList=active.length===0?`<div class="empty"><p>No active reminders. Add one above.</p></div>`:
    active.map(r=>{
      const ts=r.date?new Date(r.date).getTime():null;
      const overdue=ts&&ts<now;
      const ch=r.ch&&r.ch!=='all'?getCh(r.ch):null;
      return`<div class="reminder-item">
        <div class="r-check${r.done?' checked':''}" onclick="toggleReminder('${r.id}')"></div>
        <div class="r-body">
          <div class="r-text">${r.text}</div>
          <div class="r-meta">
            ${r.date?`<span class="r-date-tag${overdue?' overdue':''}">${overdue?'Overdue · ':'Due · '}${fmtDateShort(new Date(r.date).getTime())}</span>`:''}
            ${ch?`<span class="r-ch-tag">${ch.name}</span>`:''}
            <span class="r-priority rp-${r.priority}">${r.priority}</span>
          </div>
        </div>
        <button class="del-btn" onclick="delReminder('${r.id}')">✕</button>
      </div>`;
    }).join('');

  const doneList=done.length===0?'':done.slice(-5).reverse().map(r=>`<div class="reminder-item done">
    <div class="r-check checked"></div>
    <div class="r-body"><div class="r-text">${r.text}</div></div>
    <button class="del-btn" onclick="delReminder('${r.id}')">✕</button>
  </div>`).join('');

  return`
    <div class="page-head">
      <div class="page-title">Reminders</div>
      <div class="page-sub">${active.length} active · ${done.length} completed</div>
    </div>
    <div class="j-head">
      <div class="j-title">Active</div>
      ${!S.addingReminder?`<button class="btn-new" onclick="openAddReminder()">+ Add reminder</button>`:''}
    </div>
    ${addForm}
    <div class="reminder-list">${rList}</div>
    ${doneList?`<hr class="divider"><div style="font-size:12px;color:var(--ink3);margin-bottom:10px">Recently completed</div><div class="reminder-list">${doneList}</div>`:''}`;
}

/* ── EVENT HANDLERS ── */
function attachChannelEvents(){
  if(S.composing){
    setTimeout(()=>{
      const ta=document.getElementById('compose-ta');
      if(ta){ta.focus();ta.addEventListener('input',()=>{S.composeText=ta.value;const c=document.getElementById('comp-char');if(c)c.textContent=ta.value.length+' chars';});}
    },50);
  }
  if(S.editing){
    setTimeout(()=>{
      const k=S.editing.split(':')[1];
      const el=document.getElementById('pf-'+k);
      if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}
    },50);
  }
}

function attachEmailEvents(){
  ['em-to','em-type','em-tone','em-ctx'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener('input',()=>{
      if(id==='em-to')S.emailTo=el.value;
      if(id==='em-type')S.emailType=el.value;
      if(id==='em-tone')S.emailTone=el.value;
      if(id==='em-ctx')S.emailContext=el.value;
    });
  });
}

function attachReminderEvents(){
  if(S.addingReminder){
    setTimeout(()=>{
      const el=document.getElementById('r-text');if(el)el.focus();
      const dt=document.getElementById('r-date');if(dt)dt.addEventListener('change',()=>S.rDate=dt.value);
      const rt=document.getElementById('r-text');if(rt)rt.addEventListener('input',()=>S.rText=rt.value);
    },50);
  }
}

/* ── JOURNAL ACTIONS ── */
function editPlan(key){S.editing=S.selCh+':'+key;render();}
function cancelEdit(){S.editing=null;render();}
function savePlan(key){
  const el=document.getElementById('pf-'+key);if(!el)return;
  if(!S.plans[S.selCh])S.plans[S.selCh]={};
  S.plans[S.selCh][key]=el.value;
  S.editing=null;lsSet('tp_plans',S.plans);
  showToast('Plan saved');render();
}
function openCompose(){S.composing=true;S.composeText='';S.composeType='journal';render();}
function cancelCompose(){S.composing=false;S.composeText='';render();}
function setType(t){
  const ta=document.getElementById('compose-ta');if(ta)S.composeText=ta.value;
  S.composeType=t;render();
  setTimeout(()=>{const ta=document.getElementById('compose-ta');if(ta){ta.focus();ta.value=S.composeText;ta.setSelectionRange(ta.value.length,ta.value.length);}},30);
}
function logEntry(){
  const ta=document.getElementById('compose-ta');
  const text=(ta?ta.value:S.composeText).trim();
  if(!text)return;
  S.entries.push({id:uid(),ch:S.selCh,type:S.composeType,text,ts:Date.now()});
  S.composing=false;S.composeText='';
  lsSet('tp_entries',S.entries);
  showToast('Entry logged');render();
}
function delEntry(id){
  if(!confirm('Delete this entry?'))return;
  S.entries=S.entries.filter(e=>e.id!==id);
  lsSet('tp_entries',S.entries);render();
}
function setFilter(k,v){if(k==='ch')S.filterCh=v;else S.filterType=v;render();}

/* ── REMINDER ACTIONS ── */
function openAddReminder(){S.addingReminder=true;S.rText='';S.rDate='';S.rCh='all';S.rPriority='med';render();}
function cancelAddReminder(){S.addingReminder=false;render();}
function setRPriority(p){S.rPriority=p;render();setTimeout(()=>{const el=document.getElementById('r-text');if(el)el.focus();},30);}
function addReminder(){
  const text=(document.getElementById('r-text')?.value||S.rText).trim();
  if(!text)return;
  const date=document.getElementById('r-date')?.value||S.rDate;
  const ch=document.getElementById('r-ch')?.value||S.rCh;
  S.reminders.push({id:uid(),text,date,ch,priority:S.rPriority,done:false,ts:Date.now()});
  S.addingReminder=false;S.rText='';S.rDate='';
  lsSet('tp_reminders',S.reminders);
  showToast('Reminder added');render();
}
function toggleReminder(id){
  const r=S.reminders.find(r=>r.id===id);if(!r)return;
  r.done=!r.done;
  lsSet('tp_reminders',S.reminders);render();
}
function delReminder(id){
  S.reminders=S.reminders.filter(r=>r.id!==id);
  lsSet('tp_reminders',S.reminders);render();
}

/* ── EMAIL ACTIONS ── */
async function generateEmail(){
  const to=document.getElementById('em-to')?.value||S.emailTo;
  const ctx=document.getElementById('em-ctx')?.value||S.emailContext;
  const tone=document.getElementById('em-tone')?.value||S.emailTone;
  const type=document.getElementById('em-type')?.value||S.emailType;
  const chId=document.getElementById('em-ch')?.value;
  S.emailTo=to;S.emailContext=ctx;S.emailTone=tone;S.emailType=type;
  if(!ctx.trim()){alert('Please describe what you need the email to achieve.');return;}
  S.emailGenerating=true;S.emailOutput='';render();
  const ch=chId?getCh(chId):null;
  const prompt=`You are drafting a professional email on behalf of Muhannad Taslaq, a Jordanian-American entrepreneur and investor.

About Muhannad:
- Director of Investments at Alchemist Doha (GCC fund of Silicon Valley's most selective B2B accelerator)
- Founder of Turab Partners, a boutique advisory practice that designs and builds venture ecosystems for governments, universities, and development institutions across MENA, GCC, Turkey, and Central Asia
- Co-founded Mixed Dimensions (raised $50M, 300+ team, backed by Dolby, Draper, Alsop Louie)
- Received the Silver Jubilee Medal from HM King Abdullah II of Jordan in 2025
- Built the PSUT Venture Lab and advises TheCore at Al-Hussein Technical University
- Chapter Director of Startup Grind Amman

Email details:
- Recipient: ${to||'the recipient'}
- Type: ${type}
- Tone: ${tone}
${ch?`- Related to: ${ch.name} (${ch.price})`:''} 
- Context and goal: ${ctx}

Write a complete email including subject line. The email should:
- Sound like Muhannad — direct, experienced, warm but not overly casual
- Be concise — no fluff, no clichés
- Lead with value, not biography
- End with a clear, specific call to action
- Be appropriate for a senior institutional or government audience

Format: Start with "Subject: ..." then a blank line, then the email body. Sign off as Muhannad Taslaq.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    S.emailOutput=data.content?.[0]?.text||'Could not generate email. Please try again.';
  }catch(e){
    S.emailOutput='Error connecting to Claude. Please check your connection and try again.';
  }
  S.emailGenerating=false;render();
}

function copyEmail(){
  if(!S.emailOutput)return;
  navigator.clipboard.writeText(S.emailOutput).then(()=>showToast('Copied to clipboard'));
}
function clearEmail(){S.emailOutput='';S.emailTo='';S.emailContext='';render();}

load();
</script>
</body>
